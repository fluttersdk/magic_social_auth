name: Bug Report
description: Report a bug in magic_social_auth
labels: ["bug"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module is affected?
      options:
        - Drivers (Google, Microsoft, GitHub)
        - SocialAuthManager
        - ServiceProvider
        - UI (SocialAuthButtons)
        - Models (SocialToken, SocialPlatform)
        - Exceptions
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "0.0.1-alpha.1"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Web
        - macOS
        - Windows
        - Linux
    validations:
      required: true
